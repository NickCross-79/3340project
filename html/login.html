<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer Loot | Sign In</title>
    <link id="theme-style" rel="stylesheet" href="../css/default-theme.css">
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.getElementById('theme-style').href='../css/'+t;})();</script>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/form-and-help.css">
</head>
<body>

    <div id="header-container"></div>

    <div class="auth-wrap">
        <div class="auth-box">
            <h1>Sign In</h1>
            <p>Welcome back to Lancer Loot</p>
            <form action="../php/auth/login.php" method="post">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

                <button type="submit">Sign In</button>
            </form>
            <p class="note">Don't have an account? <a href="register.html">Register free</a></p>
            <script>
                const params = new URLSearchParams(location.search);
                const msgs = {
                    missing_fields: 'Please fill in all fields.',
                    invalid_credentials: 'Incorrect email or password.',
                };
                if (params.get('error')) {
                    const div = document.createElement('p');
                    div.style.cssText = 'color:#c00;background:#fee;padding:8px;border-radius:4px;margin-bottom:12px;';
                    div.textContent = msgs[params.get('error')] || 'An error occurred. Please try again.';
                    document.querySelector('.auth-box').prepend(div);
                }
            </script>
        </div>
    </div>

    <footer>&copy; 2026 Lancer Loot</footer>

    <script src="../js/scripts.js"></script>
</body>
</html>
