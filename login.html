<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer Loot | Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #fff; color: #333; }

        nav {
            background: #331e36;
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { font-size: 1.4rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 0.95rem; }
        nav a:hover { text-decoration: underline; }

        .auth-wrap {
            display: flex;
            justify-content: center;
            padding: 48px 24px;
        }
        .auth-box {
            background: white;
            padding: 32px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .auth-box h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .auth-box p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .auth-box label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: bold; }
        .auth-box input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .auth-box button {
            width: 100%;
            padding: 10px;
            background: #41337a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .auth-box button:hover { background: #331e36; }
        .auth-box .note { color: #555; font-size: 0.85rem; margin-top: 16px; text-align: center; }
        .auth-box .note a { color: #41337a; text-decoration: none; }
        .auth-box .note a:hover { text-decoration: underline; }

        footer {
            background: #331e36;
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">Lancer Loot</span>
        <div>
            <a href="index.html#listings">Browse</a>
            <a href="index.html#sell">Sell</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="auth-box">
            <h1>Sign In</h1>
            <p>Welcome back to Lancer Loot</p>
            <form action="#" method="post" onsubmit="return false;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

                <button type="submit">Sign In</button>
            </form>
            <p class="note">Don't have an account? <a href="register.html">Register free</a></p>
        </div>
    </div>

    <footer>&copy; 2026 Lancer Loot</footer>

</body>
</html>
