<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeNest | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Sora:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">TradeNest</a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html#discover">Discover</a></li>
          <li><a href="index.html#categories">Categories</a></li>
          <li><a href="index.html#sell">Sell</a></li>
        </ul>
      </nav>
      <a class="btn btn-light" href="register.html">Create Account</a>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your TradeNest account</p>

        <form class="auth-form" action="#" method="post">
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button class="btn btn-primary btn-full" type="submit">Sign In</button>
        </form>

        <p class="auth-footer-note">
          Don't have an account?
          <a href="register.html">Create one free</a>
        </p>
      </div>
    </main>

    <footer class="site-footer"></footer>
  </body>
</html>
