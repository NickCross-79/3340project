<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer Loot | Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #fff; color: #333; }

        nav {
            background: #331e36;
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { font-size: 1.4rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 0.95rem; }
        nav a:hover { text-decoration: underline; }

        .auth-wrap {
            display: flex;
            justify-content: center;
            padding: 48px 24px;
        }
        .auth-box {
            background: white;
            padding: 32px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        .auth-box h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .auth-box p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .auth-box label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: bold; }
        .auth-box input[type="text"],
        .auth-box input[type="email"],
        .auth-box input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .name-row { display: flex; gap: 12px; }
        .name-row > div { flex: 1; }
        .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 0.9rem; font-weight: normal; }
        .auth-box button {
            width: 100%;
            padding: 10px;
            background: #63ea4b;
            color: #331e36;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .auth-box button:hover { background: #41337a; color: white; }
        .auth-box .note { color: #555; font-size: 0.85rem; margin-top: 16px; text-align: center; }
        .auth-box .note a { color: #41337a; text-decoration: none; }
        .auth-box .note a:hover { text-decoration: underline; }

        footer {
            background: #331e36;
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">Lancer Loot</span>
        <div>
            <a href="index.html#listings">Browse</a>
            <a href="index.html#sell">Sell</a>
            <a href="login.html">Sign In</a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="auth-box">
            <h1>Create an Account</h1>
            <p>Join Lancer Loot and start buying or selling locally</p>
            <form action="#" method="post" onsubmit="return false;">
                <div class="name-row">
                    <div>
                        <label for="first-name">First name</label>
                        <input type="text" id="first-name" name="firstName" placeholder="Alex" autocomplete="given-name" required>
                    </div>
                    <div>
                        <label for="last-name">Last name</label>
                        <input type="text" id="last-name" name="lastName" placeholder="Johnson" autocomplete="family-name" required>
                    </div>
                </div>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password" required>

                <label for="confirm-password">Confirm password</label>
                <input type="password" id="confirm-password" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>

                <label class="check-row" for="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <span>I agree to the Terms and Community Guidelines.</span>
                </label>

                <button type="submit">Create Account</button>
            </form>
            <p class="note">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <footer>&copy; 2026 Lancer Loot</footer>

</body>
</html>
