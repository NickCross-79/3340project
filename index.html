<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer Loot</title>
    <link id="theme-style" rel="stylesheet" href="css/default-theme.css">
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.getElementById('theme-style').href='css/'+t;})();</script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/form-and-help.css">
</head>
<body>

    <div id="header-container"></div>

    <!-- Hero / Search -->
    <div class="hero">
        <h1>Buy &amp; Sell Near You</h1>
        <p>Find great deals or list your items for free.</p>
        <form onsubmit="loadListings(this.querySelector('input').value); document.getElementById('listings').scrollIntoView({behavior:'smooth'}); return false;">
            <input type="search" placeholder="Search listings...">
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- Listings -->
    <div class="section" id="listings">
        <h2>Recent Listings</h2>
        <div class="listings" id="listings-grid">
            <!-- Populated by scripts.js -->
        </div>
    </div>

    <!-- Sell CTA -->
    <div class="section" id="sell">
        <h2>Post a Listing</h2>
        <p style="color:var(--muted);margin-bottom:16px;">Have something to sell? Create a free listing and reach local buyers.</p>
        <a href="html/add-item-to-sell.html" class="btn" style="padding:12px 28px;font-size:1rem;">Start Selling</a>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2026 Lancer Loot. All rights reserved.
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
